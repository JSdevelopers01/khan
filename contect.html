<!DOCTYPE html>
<html>
<head>
<title>Form</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}

.form-box {
  width: 350px;
  margin: 50px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}

.gender {
  margin: 10px 0;
}
</style>

</head>

<body>

<div class="form-box">

<form action="https://formspree.io/f/yourID" method="POST" onsubmit="sendToWhatsApp()">

<input type="text" id="fname" name="First Name" placeholder="First Name" required>
<input type="text" id="lname" name="Last Name" placeholder="Last Name" required>
<input type="text" id="father" name="Father Name" placeholder="Father Name">
<input type="number" id="age" name="Age" placeholder="Age">

<div class="gender">
  <label><input type="radio" name="Gender" value="Male"> Male</label>
  <label><input type="radio" name="Gender" value="Female"> Female</label>
</div>

<input type="email" id="email" name="Email" placeholder="Email" required>
<input type="text" id="phone" name="Phone" placeholder="Phone">

<button type="submit">Submit</button>

</form>

</div>

<script>
function sendToWhatsApp() {

  var fname = document.getElementById("fname").value;
  var lname = document.getElementById("lname").value;
  var father = document.getElementById("father").value;
  var age = document.getElementById("age").value;
  var email = document.getElementById("email").value;
  var phone = document.getElementById("phone").value;

  var gender = document.querySelector('input[name="Gender"]:checked');
  gender = gender ? gender.value : "";

  var message =
    "First Name: " + fname + "%0A" +
    "Last Name: " + lname + "%0A" +
    "Father Name: " + father + "%0A" +
    "Age: " + age + "%0A" +
    "Gender: " + gender + "%0A" +
    "Email: " + email + "%0A" +
    "Phone: " + phone;

  var url = "https://wa.me/9653590754?text=" + message;

  window.open(url, "_blank");
}
</script>

</body>
